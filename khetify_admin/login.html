<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8" />
    <title>KrishiNex Admin – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#16A34A',
                            blue: '#0EA5E9',
                        },
                    },
                },
            },
        };
    </script>
</head>

<body class="h-full bg-gradient-to-br from-emerald-50 via-slate-100 to-sky-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo & Brand -->
        <div class="text-center mb-8">
            <div
                class="inline-flex h-20 w-20 items-center justify-center rounded-2xl bg-white shadow-2xl mb-4 overflow-hidden border-2 border-emerald-100">
                <img src="images/logo.png" alt="KrishiNex Logo" class="h-16 w-16 object-contain">
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900">KrishiNex Admin</h1>
            <p class="text-sm text-slate-500 font-bold mt-2 uppercase tracking-widest">Management Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl border-2 border-white shadow-2xl overflow-hidden">
            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2"
                            for="email">
                            Email Address
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="email" required
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-sm font-bold text-slate-900"
                                placeholder="admin@khetify.com" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2"
                            for="password">
                            Password
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" required
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-sm font-bold text-slate-900"
                                placeholder="••••••••" />
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-600 to-sky-600 text-white font-black text-sm shadow-xl shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 mt-8">
                        <span id="btnText">Sign In to Dashboard</span>
                        <i class="fas fa-arrow-right" id="btnIcon"></i>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="bg-slate-50/50 border-t-2 border-white p-6 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    Secured by KrishiNex Infrastructure
                </p>
            </div>
        </div>

        <!-- Error Toast -->
        <div id="toast"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden rounded-2xl bg-rose-500 px-6 py-4 shadow-2xl border-2 border-rose-400 animate-bounce">
            <p id="toastMsg" class="text-xs font-black text-white"></p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://demo.ranx24.com/api';
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            document.getElementById('btnText').textContent = 'Authenticating...';
            document.getElementById('btnIcon').className = 'fas fa-circle-notch animate-spin';

            try {
                const response = await fetch(`${API_BASE}/auth/login-employee`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Store token and redirect
                    localStorage.setItem('employeeToken', data.token);
                    localStorage.setItem('employeeUser', JSON.stringify(data.user));

                    document.getElementById('btnText').textContent = 'Success! Redirecting...';
                    document.getElementById('btnIcon').className = 'fas fa-check';
                    submitBtn.classList.replace('from-emerald-600', 'from-green-500');
                    submitBtn.classList.replace('to-sky-600', 'to-emerald-500');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    showError(data.error || 'Login failed. Check credentials.');
                }
            } catch (err) {
                showError('Network error. Check server status.');
            } finally {
                if (!localStorage.getItem('employeeToken')) {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70');
                    document.getElementById('btnText').textContent = 'Sign In to Dashboard';
                    document.getElementById('btnIcon').className = 'fas fa-arrow-right';
                }
            }
        });

        function showError(msg) {
            toastMsg.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>

</html>
