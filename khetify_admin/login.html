<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <script src="js/auth.js"></script>
    <meta charset="UTF-8" />
    <title>KrishiNex Admin – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">


    <script>
        tailwind.config = {
            theme: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
                extend: {
                    colors: {
                        brand: {
                            green: '#16A34A',
                            blue: '#0EA5E9',
                        },
                    },
                },
            },
        };
    </script>
    <style>
    </style>
</head>

<body class="h-full bg-gradient-to-br from-emerald-50 via-slate-100 to-sky-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo & Brand -->
        <div class="text-center mb-8">
            <div
                class="inline-flex h-20 w-20 items-center justify-center rounded-2xl bg-white shadow-2xl mb-4 overflow-hidden border-2 border-emerald-100">
                <img src="images/logo.png" alt="KrishiNex Logo" class="h-16 w-16 object-contain">
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900">KrishiNex Admin</h1>
            <p class="text-sm text-slate-500 font-bold mt-2 uppercase tracking-widest">Management Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 backdrop-blur-xl rounded-3xl border-2 border-white shadow-2xl overflow-hidden">
            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2"
                            for="email">
                            Email Address
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="email" required
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-sm font-bold text-slate-900"
                                placeholder="admin@krishinex.com" />
                        </div>
                    </div>

                    <div id="passwordField">
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2"
                            for="password">
                            Password
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" required
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-sm font-bold text-slate-900"
                                placeholder="••••••••" />
                        </div>
                    </div>

                    <!-- OTP SECTION -->
                    <div id="otpSection" class="hidden space-y-4">
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2">
                            Enter 4-Digit Verification Code
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-key"></i>
                            </span>
                            <input type="text" id="otpCode" maxlength="4"
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-2 border-emerald-100 bg-emerald-50/30 focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none text-xl font-black text-slate-900 text-center tracking-[15px]"
                                placeholder="0000" />
                        </div>
                        <p class="text-[10px] text-slate-500 font-bold text-center italic">Code sent to your email.
                            Check inbox/spam.</p>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-600 to-sky-600 text-white font-black text-sm shadow-xl shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 mt-8">
                        <span id="btnText">Sign In to Dashboard</span>
                        <i class="fas fa-arrow-right" id="btnIcon"></i>
                    </button>

                    <button type="button" id="verifyOtpBtn"
                        class="hidden w-full py-4 rounded-2xl bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-black text-sm shadow-xl shadow-teal-500/20 hover:shadow-teal-500/40 hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 mt-8">
                        <span id="otpBtnText">Verify & Login</span>
                        <i class="fas fa-shield-check" id="otpBtnIcon"></i>
                    </button>

                    <button type="button" id="backToLogin"
                        class="hidden w-full text-center text-[10px] font-black text-slate-400 uppercase tracking-wider hover:text-emerald-600 transition-colors">
                        Back to Credentials
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="bg-slate-50/50 border-t-2 border-white p-6 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    Secured by KrishiNex Infrastructure
                </p>
            </div>
        </div>

        <!-- Error Toast -->
        <div id="toast"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden rounded-2xl bg-rose-500 px-6 py-4 shadow-2xl border-2 border-rose-400 animate-bounce">
            <p id="toastMsg" class="text-xs font-black text-white"></p>
        </div>
    </div>

    <script>

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const backToLogin = document.getElementById('backToLogin');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        let pendingEmail = '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            document.getElementById('btnText').textContent = 'Authenticating...';
            document.getElementById('btnIcon').className = 'fas fa-circle-notch animate-spin';

            try {
                // Fallback for API Base if auth.js fails to load
                const apiBase = window.API_BASE || 'https://demo.ranx24.com/api';
                
                const response = await fetch(`${apiBase}/auth/login-employee`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.requiresOtp) {
                        // 2FA TRIGGERED
                        pendingEmail = data.email;
                        document.getElementById('passwordField').classList.add('hidden');
                        document.getElementById('email').readOnly = true;
                        document.getElementById('otpSection').classList.remove('hidden');
                        submitBtn.classList.add('hidden');
                        verifyOtpBtn.classList.remove('hidden');
                        backToLogin.classList.remove('hidden');

                        document.getElementById('otpCode').focus();
                    } else {
                        // Direct Login Success (for non-admins)
                        completeLogin(data);
                    }
                } else {
                    showError(data.error || 'Login failed. Check credentials.');
                }
            } catch (err) {
                console.error('[CRITICAL] Login Network Error:', err);
                showError('Network error. Check server status.');
            } finally {
                if (!pendingEmail) {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70');
                    document.getElementById('btnText').textContent = 'Sign In to Dashboard';
                    document.getElementById('btnIcon').className = 'fas fa-arrow-right';
                }
            }
        });

        verifyOtpBtn.addEventListener('click', async () => {
            const otp = document.getElementById('otpCode').value;
            if (otp.length !== 4) return showError('Please enter 4-digit code.');

            verifyOtpBtn.disabled = true;
            document.getElementById('otpBtnText').textContent = 'Verifying...';

            try {
                // Fallback for API Base if auth.js fails to load
                const apiBase = window.API_BASE || 'https://demo.ranx24.com/api';

                const response = await fetch(`${apiBase}/auth/verify-otp-employee`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    completeLogin(data);
                } else {
                    showError(data.error || 'Invalid OTP');
                    verifyOtpBtn.disabled = false;
                    document.getElementById('otpBtnText').textContent = 'Verify & Login';
                }
            } catch (err) {
                showError('Network error during verification.');
                verifyOtpBtn.disabled = false;
                document.getElementById('otpBtnText').textContent = 'Verify & Login';
            }
        });

        backToLogin.addEventListener('click', () => {
            pendingEmail = '';
            document.getElementById('passwordField').classList.remove('hidden');
            document.getElementById('email').readOnly = false;
            document.getElementById('otpSection').classList.add('hidden');
            submitBtn.classList.remove('hidden');
            verifyOtpBtn.classList.add('hidden');
            backToLogin.classList.add('hidden');

            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-70');
            document.getElementById('btnText').textContent = 'Sign In to Dashboard';
        });

        function completeLogin(data) {
            localStorage.setItem('employeeToken', data.token);
            localStorage.setItem('employeeUser', JSON.stringify(data.user));

            const activeBtn = !verifyOtpBtn.classList.contains('hidden') ? verifyOtpBtn : submitBtn;
            const btnTextId = !verifyOtpBtn.classList.contains('hidden') ? 'otpBtnText' : 'btnText';
            const btnIconId = !verifyOtpBtn.classList.contains('hidden') ? 'otpBtnIcon' : 'btnIcon';

            document.getElementById(btnTextId).textContent = 'Success! Redirecting...';
            document.getElementById(btnIconId).className = 'fas fa-check';

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }

        function showError(msg) {
            toastMsg.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>

</html>
