<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/ksp_auth.js?v=1.0.2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSP Partner Login | KrishiNex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Decorative Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-100 rounded-full blur-[120px] opacity-60"></div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-100 rounded-full blur-[120px] opacity-60">
    </div>

    <div class="max-w-md w-full relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center h-16 w-16 bg-gradient-to-br from-blue-600 to-sky-500 rounded-2xl shadow-xl shadow-blue-200 mb-4 animate-float">
                <i class="fas fa-handshake text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">KSP Partner</h1>
            <p class="text-slate-500 font-semibold mt-1">Krishi Seva Provider Login</p>
        </div>

        <!-- Login Card -->
        <div class="glass-effect rounded-[2.5rem] shadow-2xl shadow-slate-200/60 p-8 md:p-10 border-2 border-white">
            <form id="loginForm" class="space-y-6">
                <!-- STEP 1: CREDENTIALS -->
                <div id="step1" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="email" id="email" required
                                class="block w-full h-14 pl-12 pr-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[15px] font-bold text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Password</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="password" id="password" required
                                class="block w-full h-14 pl-12 pr-12 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[15px] font-bold text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                                placeholder="••••••••">
                            <button type="button" onclick="togglePass()"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: OTP (Hidden initially) -->
                <div id="step2" class="space-y-6 hidden">
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-4">
                        <p class="text-xs font-bold text-blue-700 text-center">
                            We've sent a 6-digit verification code to your email. Please check your inbox.
                        </p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">OTP CODE</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-shield-halved text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="text" id="otp" 
                                class="block w-full h-14 pl-12 pr-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[20px] font-black text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all tracking-[0.5em]"
                                placeholder="000000" maxlength="6">
                        </div>
                    </div>
                    <button type="button" onclick="resetLogin()" class="text-[10px] text-slate-400 font-bold uppercase hover:text-blue-500 transition-colors ml-1">
                        <i class="fas fa-arrow-left mr-1"></i> Back to Login
                    </button>
                </div>

                <!-- Action Button -->
                <button type="submit" id="submitBtn"
                    class="w-full h-14 bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 text-white font-black rounded-2xl shadow-lg shadow-blue-200 flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
                    <span id="btnText">Continue to Verify</span>
                    <i class="fas fa-bolt-lightning text-amber-400" id="btnIcon"></i>
                    <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Only authorized KSP Partners
                    can access this portal</p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-400 text-xs font-bold mt-8">
            &copy; 2026 KrishiNex Technologies. All Rights Reserved.
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        class="fixed bottom-6 right-6 z-50 rounded-2xl border-2 px-6 py-4 shadow-2xl hidden animate-[slideInRight_0.3s_ease-out]">
        <p id="toastMessage" class="text-sm font-black"></p>
    </div>

    <style>
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

    <script>
         // Primary production API base

        let currentStep = 1;

        function togglePass() {
            const p = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (p.type === 'password') {
                p.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                p.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toastMessage');
            txt.textContent = msg;
            toast.className = `fixed bottom-6 right-6 z-50 rounded-2xl border-2 px-6 py-4 shadow-2xl ${type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function resetLogin() {
            currentStep = 1;
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('btnText').textContent = 'Continue to Verify';
            document.getElementById('btnIcon').className = 'fas fa-bolt-lightning text-amber-400';
            document.getElementById('submitBtn').disabled = false;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            try {
                btn.disabled = true;
                spinner.classList.remove('hidden');
                btnText.classList.add('hidden');
                btnIcon.classList.add('hidden');

                if (currentStep === 1) {
                    // Step 1: Login & Request OTP
                    const res = await fetch(`${API_BASE}/ksp/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        currentStep = 2;
                        document.getElementById('step1').classList.add('hidden');
                        document.getElementById('step2').classList.remove('hidden');
                        btnText.textContent = 'Verify & Access Dashboard';
                        btnIcon.className = 'fas fa-shield-check text-emerald-400';
                        showToast('Credentials verified! OTP sent to email.', 'success');
                    } else {
                        showToast(data.error || 'Login failed', 'error');
                    }
                } else {
                    // Step 2: Verify OTP
                    const otp = document.getElementById('otp').value;
                    if (!otp || otp.length < 6) return showToast('Enter 6ndigit OTP', 'error');

                    const res = await fetch(`${API_BASE}/ksp/verify-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        localStorage.setItem('kspToken', data.token);
                        localStorage.setItem('kspUser', JSON.stringify(data.user));
                        showToast('OTP Verified! Redirecting...', 'success');
                        setTimeout(() => window.location.href = 'ksp_dashboard.html', 1500);
                        return; // Keep spinner visible during redirect
                    } else {
                        showToast(data.error || 'Invalid OTP', 'error');
                    }
                }
            } catch (err) {
                showToast('Network error. Check connection.', 'error');
            } finally {
                if (currentStep === 2 && btnText.textContent === 'Verify & Access Dashboard') {
                    // Stay in Step 2 unless it was a final success
                } else if (currentStep === 1) {
                   // reset state for retry in step 1
                }
                
                // Always re-enable if not redirecting
                if (!toast.textContent.includes('Verified')) {
                    btn.disabled = false;
                    spinner.classList.add('hidden');
                    btnText.classList.remove('hidden');
                    btnIcon.classList.remove('hidden');
                }
            }
        });
    </script>
</body>

</html>
