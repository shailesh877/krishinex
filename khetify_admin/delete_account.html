<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Your Account | KrishiNex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-slate-100">
        <div class="h-20 w-20 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-black text-slate-900 mb-3">Delete Your Account?</h1>
        <p class="text-slate-500 text-sm mb-8 leading-relaxed">
            We're sorry to see you go. Deleting your account will permanently remove your profile, wallet history, and all agricultural data. This action cannot be undone.
        </p>

        <form id="deleteForm" class="space-y-4">
            <input type="tel" id="phone" placeholder="Enter Registered Phone Number" required
                class="w-full h-12 px-4 rounded-xl border-2 border-slate-100 focus:border-rose-500 outline-none transition-all text-center font-bold">
            
            <textarea id="reason" placeholder="Reason for deletion (Optional)" 
                class="w-full h-24 p-4 rounded-xl border-2 border-slate-100 focus:border-rose-500 outline-none transition-all text-sm resize-none"></textarea>

            <button type="submit" id="submitBtn"
                class="w-full h-12 bg-rose-600 text-white font-bold rounded-xl shadow-lg shadow-rose-100 hover:bg-rose-700 transition-all flex items-center justify-center gap-2">
                Request Account Deletion
            </button>
        </form>

        <div id="successMsg" class="hidden mt-6 p-4 bg-emerald-50 text-emerald-700 rounded-xl border border-emerald-100 text-sm font-bold animate-bounce">
            Deletion request submitted! Our team will process it within 48 hours.
        </div>

        <p class="mt-8 text-[10px] text-slate-400 font-medium">
            Contact Support: <a href="mailto:support@krishinex.com" class="text-blue-500 underline">support@krishinex.com</a>
        </p>
    </div>

    <script>
        document.getElementById('deleteForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const phone = document.getElementById('phone').value;
            
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...';

            // Simulate sending request (In reality, we would call an API)
            setTimeout(() => {
                document.getElementById('deleteForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
            }, 1500);
        };
    </script>
</body>
</html>
