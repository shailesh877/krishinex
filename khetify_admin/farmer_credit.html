<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <title>Farmer Credit Management - KrishiNex Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="js/auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { green: '#16A34A', blue: '#0EA5E9' },
          },
        },
      },
    };
  </script>
  <style>
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>

<body class="h-full bg-slate-50 text-slate-900">
  <div class="min-h-screen flex">
    <!-- SIDEBAR (Simplified for this page) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white border-r-2 border-slate-200 shadow-xl hidden md:flex flex-col">
      <div class="h-16 flex items-center px-4 border-b-2 border-slate-200">
        <img src="images/logo.png" class="h-8 w-8" alt="">
        <span class="ml-3 font-black text-emerald-600">KrishiNex Admin</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-emerald-50 hover:text-emerald-600">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="users_managment.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-emerald-50 hover:text-emerald-600">
          <i class="fas fa-users"></i> Users Management
        </a>
        <a href="farmer_credit.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-black bg-emerald-50 text-emerald-700">
          <i class="fas fa-credit-card"></i> Farmer Credit
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col md:ml-64">
      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/80 backdrop-blur-md px-6 py-4 flex items-center justify-between">
        <h1 class="text-xl font-black text-slate-900 flex items-center gap-2">
          <i class="fas fa-credit-card text-emerald-600"></i>
          Farmer Credit Management
        </h1>
        <div class="flex items-center gap-4">
           <input type="text" id="searchInput" oninput="fetchFarmers()" placeholder="Search by name or phone..." class="px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500/20">
        </div>
      </header>

      <main class="p-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
              <tr>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase">Farmer</th>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase">Location</th>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase text-center">Credit Limit</th>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase text-center">Used</th>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase text-center">Available</th>
                <th class="px-6 py-4 text-[11px] font-black text-slate-500 uppercase text-right">Action</th>
              </tr>
            </thead>
            <tbody id="farmerTableBody" class="divide-y divide-slate-100">
                <!-- Rows will be injected here -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- CREDIT EDIT MODAL -->
  <div id="creditModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6">
        <h2 class="text-xl font-black text-slate-900 mb-2">Assign Credit Limit</h2>
        <p id="modalFarmerName" class="text-sm text-slate-500 font-bold mb-6">Farmer Name</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">New Credit Limit (₹)</label>
                <input type="number" id="newLimitInput" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-emerald-500 outline-none font-black text-lg" placeholder="e.g. 50000">
            </div>
            <button onclick="saveCreditLimit()" id="saveBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-black shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center gap-2">
                Update Limit
            </button>
            <button onclick="closeModal()" class="w-full py-2 text-slate-400 font-bold text-sm">Cancel</button>
        </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 z-[100] transform translate-y-20 opacity-0 transition-all duration-300">
    <div class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
      <i class="fas fa-check-circle text-emerald-400"></i>
      <span id="toastMsg" class="text-sm font-black"></span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://demo.ranx24.com/api';
    const SERVER_URL = 'https://demo.ranx24.com';
    const token = localStorage.getItem('employeeToken');

    let currentEditingFarmerId = null;

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').innerText = msg;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
    }

    async function fetchFarmers() {
      const search = document.getElementById('searchInput').value;
      try {
        const res = await fetch(`${API_BASE}/user/admin/farmers?search=${search}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        const tbody = document.getElementById('farmerTableBody');
        tbody.innerHTML = '';

        data.forEach(farmer => {
          const avail = (farmer.creditLimit || 0) - (farmer.creditUsed || 0);
          const row = document.createElement('tr');
          row.className = 'hover:bg-slate-50 transition-colors group';
          row.innerHTML = `
            <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-full bg-slate-100 overflow-hidden border-2 border-white shadow-sm">
                        <img src="${farmer.profilePhotoUrl ? (farmer.profilePhotoUrl.startsWith('http') ? farmer.profilePhotoUrl : SERVER_URL + '/' + farmer.profilePhotoUrl) : 'images/logo.png'}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="font-black text-slate-800 text-sm">${farmer.name}</p>
                        <p class="text-[10px] font-bold text-slate-400">${farmer.phone}</p>
                    </div>
                </div>
            </td>
            <td class="px-6 py-4 text-xs font-bold text-slate-500">${farmer.address || farmer.village || 'N/A'}</td>
            <td class="px-6 py-4 text-center font-black text-slate-700">₹${farmer.creditLimit || 0}</td>
            <td class="px-6 py-4 text-center font-bold text-red-500">₹${farmer.creditUsed || 0}</td>
            <td class="px-6 py-4 text-center font-black text-emerald-600">₹${avail}</td>
            <td class="px-6 py-4 text-right">
                <button onclick="openModal('${farmer._id}', '${farmer.name}', ${farmer.creditLimit || 0})" class="px-4 py-1.5 bg-slate-900 text-white rounded-lg text-[11px] font-black hover:bg-emerald-600 transition-colors">
                    Assign Credit
                </button>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error(err);
      }
    }

    function openModal(id, name, limit) {
        currentEditingFarmerId = id;
        document.getElementById('modalFarmerName').innerText = name;
        document.getElementById('newLimitInput').value = limit;
        document.getElementById('creditModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('creditModal').classList.add('hidden');
    }

    async function saveCreditLimit() {
        const limit = document.getElementById('newLimitInput').value;
        const btn = document.getElementById('saveBtn');
        const originalText = btn.innerHTML;

        try {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const res = await fetch(`${API_BASE}/user/admin/credit/${currentEditingFarmerId}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ creditLimit: limit })
            });

            if (res.ok) {
                showToast('Credit Limit Updated');
                closeModal();
                fetchFarmers();
            } else {
                showToast('Update Failed');
            }
        } catch (err) {
            showToast('Network Error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    fetchFarmers();
  </script>
  <script src="js/sidebar-guard.js"></script>
</body>
</html>
