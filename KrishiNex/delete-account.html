<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiNex - Delete Account</title>
    <link rel="icon" href="https://demo.ranx24.com/assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --text: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(226, 232, 240, 0.8);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.2);
        }

        h1 {
            color: var(--text);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: var(--danger);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.2);
        }

        .btn-primary:hover {
            background-color: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
        }

        .btn-primary:disabled {
            background-color: #fca5a5;
            cursor: not-allowed;
            transform: none;
        }

        #otp-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fee2e2;
        }

        .alert-success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #dcfce7;
        }

        .warning-box {
            background: #fff5f5;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--danger);
            text-align: left;
            margin-bottom: 20px;
        }

        .warning-box span {
            display: block;
            font-weight: 700;
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .warning-box p {
            margin-bottom: 0;
            font-size: 13px;
            color: #7f1d1d;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://demo.ranx24.com/assets/images/Krishinex App logo PNG.png" alt="KrishiNex" class="logo">
        <h1>Delete Account</h1>
        <p>Enter your email to receive a verification code to permanently delete your account.</p>

        <div id="alert-box" class="alert"></div>

        <!-- Step 1: Request OTP -->
        <div id="request-section">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <button id="send-btn" class="btn btn-primary" onclick="requestOtp()">Send Verification Code</button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="otp-section">
            <div class="warning-box">
                <span>Critical Warning</span>
                <p>Entering the code will permanently erase all your data, profile, and history.</p>
            </div>
            <div class="input-group">
                <label for="otp">Verification Code</label>
                <input type="text" id="otp" placeholder="Enter 4-digit code" maxlength="4">
            </div>
            <button id="delete-btn" class="btn btn-primary" onclick="confirmDeletion()">Confirm Permanent Deletion</button>
            <button class="btn" style="background:none; color:#64748b; font-size:14px; margin-top:10px;" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://demo.ranx24.com/api/auth';
        let userEmail = '';

        function showAlert(msg, type) {
            const box = document.getElementById('alert-box');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
        }

        async function requestOtp() {
            const emailInput = document.getElementById('email');
            const btn = document.getElementById('send-btn');
            userEmail = emailInput.value.trim();

            if (!userEmail) {
                showAlert('Please enter your email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE}/request-deletion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('request-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    showAlert('Verification code sent to your email.', 'success');
                } else {
                    showAlert(data.error || 'Failed to send code.', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Verification Code';
            }
        }

        async function confirmDeletion() {
            const otpInput = document.getElementById('otp');
            const btn = document.getElementById('delete-btn');
            const otp = otpInput.value.trim();

            if (otp.length !== 4) {
                showAlert('Please enter a valid 4-digit code.', 'error');
                return;
            }

            if (!confirm('Are you absolutely sure? This action is IRREVERSIBLE.')) {
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Deleting Account...';

            try {
                const response = await fetch(`${API_BASE}/confirm-deletion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    document.body.innerHTML = `
                        <div class="container">
                            <div style="background:#f0fdf4; padding:20px; border-radius:100px; width:80px; height:80px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center;">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                            <h1>Account Deleted</h1>
                            <p>Your account and associated data have been permanently removed from our systems.</p>
                            <button class="btn btn-primary" onclick="window.location.href='https://demo.ranx24.com'">Back to Home</button>
                        </div>
                    `;
                } else {
                    showAlert(data.error || 'Verification failed.', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirm Permanent Deletion';
            }
        }
    </script>
</body>
</html>
